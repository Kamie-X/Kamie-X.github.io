---
layout: default
---

<div style="max-width: 800px; margin: 60px auto; text-align: center; font-family: Arial, sans-serif;">

  <!-- Avatar -->
  <img 
    src="/images/avatar.png" 
    alt="Kamela avatar"
    style="width: 160px; height: 160px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.15); margin-bottom: 20px;"
  >

  <!-- Title -->
  <h1 style="font-size: 38px; margin-bottom: 10px;">
    Kamela's Website
  </h1>

  <!-- Subtitle -->
  <p style="font-size: 18px; color: #666; margin-bottom: 40px;">
    Health data science, cloud computing, and biomedical innovation
  </p>

  <hr style="margin: 40px 0;">

  <!-- Posts -->
  <h2 style="margin-bottom: 25px;">Latest Posts</h2>

  <div style="text-align: left;">
    {% for post in site.posts %}
      <div style="margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 10px;">
        <p style="margin: 0; color: #777;">
          {{ post.date | date: "%B %-d, %Y" }}
        </p>

        <h3 style="margin: 5px 0;">
          <a href="{{ post.url | relative_url }}" style="text-decoration: none;">
            {{ post.title }}
          </a>
        </h3>
      </div>
    {% endfor %}
  </div>

</div>
