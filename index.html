---
layout: default
---

<!-- Header / Hero -->
<header class="masthead text-center text-white bg-primary">
  <div class="container d-flex align-items-center flex-column">

    <img class="masthead-avatar mb-5" src="{{ site.avatar | relative_url }}" alt="Kamela avatar" style="border-radius:50%; width:180px; height:180px; object-fit:cover;">

    <h1 class="masthead-heading mb-0">BioPulse Analytics</h1>

    <div class="divider-custom divider-light">
      <div class="divider-custom-line"></div>
      <div class="divider-custom-icon">
        <i class="fas fa-heartbeat"></i>
      </div>
      <div class="divider-custom-line"></div>
    </div>

    <p class="masthead-subheading font-weight-light mb-0">
      Health Data Science • Cloud Computing • Biomedical Innovation
    </p>

  </div>
</header>

<!-- Posts Section -->
<section class="page-section portfolio" id="posts">
  <div class="container">

    <h2 class="page-section-heading text-center text-uppercase text-secondary mb-0">
      Latest Posts
    </h2>

    <div class="divider-custom">
      <div class="divider-custom-line"></div>
      <div class="divider-custom-icon">
        <i class="fas fa-book"></i>
      </div>
      <div class="divider-custom-line"></div>
    </div>

    <div class="row justify-content-center">

      {% for post in site.posts %}
      <div class="col-md-6 col-lg-4 mb-5">
        <div class="portfolio-item mx-auto p-4 shadow rounded bg-light">
          <h5>{{ post.title }}</h5>
          <p class="text-muted">{{ post.date | date: "%B %-d, %Y" }}</p>
          <a href="{{ post.url | relative_url }}" class="btn btn-primary btn-sm">
            Read More
          </a>
        </div>
      </div>
      {% endfor %}

    </div>
  </div>
</section>
